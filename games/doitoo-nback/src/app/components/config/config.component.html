<div class="config" [class.disabled]="disabled()" [attr.inert]="disabled() || null">
  <!-- Grid Size -->
  <label class="section-label">Grid Size</label>
  <div class="button-group">
    @for (size of [2, 3, 4, 5]; track size) {
      <button [class.active]="config().gridSize === size" (click)="onGridSize(size)">{{ size }}×{{ size }}</button>
    }
  </div>

  <!-- N-Level & Step Duration -->
  <div class="fields">
    <label>
      N-Level
      <input type="number" min="1" max="20" [value]="config().nLevel" (change)="onNLevel($event)" />
    </label>
    <label>
      Duration (s)
      <input type="number" min="1" max="10" step="0.5" [value]="config().stepDuration" (change)="onStepDuration($event)" />
    </label>
    <label>
      Steps
      <input type="number" min="5" max="1000" [value]="config().stepCount" (change)="onStepCount($event)" />
    </label>
  </div>

  <!-- Stimulus Intensity -->
  <label class="section-label">Intensity</label>
  <div class="button-group">
    @for (opt of intensityOptions; track opt) {
      <button [class.active]="config().intensity === opt" (click)="onIntensity(opt)">{{ opt }}%</button>
    }
  </div>

  <!-- Active Modalities -->
  <label class="section-label">Modalities</label>
  <div class="modality-toggles">
    @for (mod of ['spatial', 'shape', 'color', 'auditory']; track mod) {
      <button
        class="modality-btn"
        [class.active]="isModalityActive($any(mod))"
        (click)="toggleModality($any(mod))"
      >
        <img class="mod-icon" [src]="modalityIcon($any(mod))" [alt]="modalityLabel($any(mod))" />
        <span>{{ modalityLabel($any(mod)) }}</span>
      </button>
    }
  </div>
</div>
