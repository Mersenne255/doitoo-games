<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doitoo Games</title>
  <meta name="theme-color" content="#0f0f1a">
  <meta name="description" content="Doitoo Games — a multi-game launcher platform for cognitive training games.">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="platform.css">
</head>
<body>
  <!-- Navigation bar -->
  <nav class="nav-bar" role="navigation" aria-label="Platform navigation">
    <div class="nav-inner">
      <button
        id="back-button"
        class="back-button hidden"
        type="button"
        aria-label="Back to game selector"
      >
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5"/><path d="M19 9.5V19a1 1 0 0 1-1 1h-4v-5h-4v5H6a1 1 0 0 1-1-1V9.5"/></svg>
      </button>
      <div class="nav-brand">
        <img id="nav-logo" class="nav-logo" src="shared/doitoo-games.svg" alt="Doitoo Games" />
        <span id="nav-subtitle" class="nav-subtitle hidden"></span>
      </div>
    </div>
  </nav>

  <!-- Main content area -->
  <main>
    <!-- Game selector grid -->
    <p id="tagline" class="tagline">Grow your mind to its full potential</p>
    <section id="game-selector" class="game-selector" aria-label="Available games">
    </section>

    <!-- Empty state message (hidden by default) -->
    <div id="empty-state" class="empty-state hidden" role="status">
      <p>No games available</p>
    </div>

    <!-- Error overlay (hidden by default) -->
    <div id="error-overlay" class="error-overlay hidden" role="alert">
      <div class="error-content">
        <p id="error-message">Failed to load game.</p>
        <button id="error-back-button" type="button" class="error-back-button">
          Back to Games
        </button>
      </div>
    </div>

    <!-- Game iframe (hidden by default) -->
    <iframe
      id="game-frame"
      class="game-frame hidden"
      sandbox="allow-scripts allow-same-origin"
      title="Game frame"
    ></iframe>

    <!-- Build info footer -->
    <footer id="build-info" class="build-info"></footer>
  </main>

  <script src="platform.js"></script>
  <script>
    // Register service worker and trigger full asset caching
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(function (reg) {
        console.log('[PWA] Service worker registered');

        function cacheAllAssets(worker) {
          fetch('games/registry.json')
            .then(function (r) { return r.json(); })
            .then(function (data) {
              var games = data.games || [];
              var urlSet = new Set();

              // Collect icon URLs
              games.forEach(function (g) {
                urlSet.add(g.icon);
                urlSet.add(g.path);
              });

              // For each game, fetch its index.html and extract asset references
              var fetches = games.map(function (game) {
                return fetch(game.path)
                  .then(function (r) { return r.text(); })
                  .then(function (html) {
                    var base = game.path.substring(0, game.path.lastIndexOf('/') + 1);
                    // Extract src and href attributes
                    var re = /(?:src|href)=["']([^"']+)["']/g;
                    var m;
                    while ((m = re.exec(html)) !== null) {
                      var ref = m[1];
                      if (ref.startsWith('http') || ref.startsWith('data:') || ref.startsWith('#')) continue;
                      urlSet.add(ref.startsWith('/') ? ref : base + ref);
                    }
                  })
                  .catch(function () {});
              });

              Promise.all(fetches).then(function () {
                worker.postMessage({ type: 'CACHE_ALL', urls: Array.from(urlSet) });
              });
            })
            .catch(function () {});
        }

        var sw = reg.active || reg.installing || reg.waiting;
        if (sw && sw.state === 'activated') {
          cacheAllAssets(sw);
        } else if (sw) {
          sw.addEventListener('statechange', function handler() {
            if (sw.state === 'activated') {
              sw.removeEventListener('statechange', handler);
              cacheAllAssets(sw);
            }
          });
        }

        navigator.serviceWorker.addEventListener('message', function (event) {
          if (event.data && event.data.type === 'CACHE_COMPLETE') {
            console.log('[PWA] All assets cached for offline use');
          }
        });
      }).catch(function (err) {
        console.warn('[PWA] Service worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
