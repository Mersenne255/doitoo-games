<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doitoo Games</title>
  <link rel="stylesheet" href="platform.css">
</head>
<body>
  <!-- Navigation bar -->
  <nav class="nav-bar" role="navigation" aria-label="Platform navigation">
    <button
      id="back-button"
      class="back-button hidden"
      type="button"
      aria-label="Back to game selector"
    >
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="nav-brand">
      <img id="nav-logo" class="nav-logo" src="shared/doitoo-games.svg" alt="Doitoo Games" />
      <span id="nav-subtitle" class="nav-subtitle hidden"></span>
    </div>
  </nav>

  <!-- Main content area -->
  <main>
    <!-- Game selector grid -->
    <section id="game-selector" class="game-selector" aria-label="Available games">
    </section>

    <!-- Empty state message (hidden by default) -->
    <div id="empty-state" class="empty-state hidden" role="status">
      <p>No games available</p>
    </div>

    <!-- Error overlay (hidden by default) -->
    <div id="error-overlay" class="error-overlay hidden" role="alert">
      <div class="error-content">
        <p id="error-message">Failed to load game.</p>
        <button id="error-back-button" type="button" class="error-back-button">
          Back to Games
        </button>
      </div>
    </div>

    <!-- Game iframe (hidden by default) -->
    <iframe
      id="game-frame"
      class="game-frame hidden"
      sandbox="allow-scripts allow-same-origin"
      title="Game frame"
    ></iframe>
  </main>

  <script src="platform.js"></script>
</body>
</html>
