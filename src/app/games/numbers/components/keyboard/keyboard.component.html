<div class="keyboard-wrapper">
  @if (showStart()) {
    <button class="start-btn" [class.abort]="stage() === 'showing'" (click)="onStartOrAbort()">{{ stage() === 'showing' ? 'Abort' : 'Start Game' }}</button>
  }
  <div class="keyboard" [class.disabled]="disabled()" [attr.inert]="disabled() || null">
    @for (key of keys; track key) {
      @if (key === '⨯') {
        <button (click)="onKey(key)" class="eye-btn" aria-label="Reveal">
          <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      } @else {
        <button (click)="onKey(key)">{{ key }}</button>
      }
    }
  </div>
</div>
