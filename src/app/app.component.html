<div class="container">
  <img src="title.svg" alt="Doitoo Numbers" class="title" />

  <app-display
    [displayValue]="game.displayValue()"
    [inputValue]="game.inputValue()"
    [stage]="game.stage()"
    [mode]="game.mode()"
    [result]="game.result()"
    [numberLength]="game.config().numberLength" />

  <app-keyboard
    [disabled]="game.stage() !== 'input'"
    [showStart]="game.stage() !== 'input'"
    [stage]="game.stage()"
    (keyPress)="onVirtualKey($event)"
    (startGame)="game.startGame()"
    (abort)="game.confirm()" />

  <app-config
    [disabled]="game.stage() === 'showing' || game.stage() === 'input'"
    [mode]="game.mode()"
    [config]="game.config()"
    (modeChange)="game.setMode($event)"
    (configChange)="game.updateConfig($event)" />

  <div class="build-number">v{{ version }}</div>
</div>
