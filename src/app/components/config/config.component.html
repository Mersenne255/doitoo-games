<div class="config" [class.disabled]="disabled()" [attr.inert]="disabled() || null">
  <div class="mode-buttons">
    <button [class.active]="mode() === 'sequence'" (click)="modeChange.emit('sequence')">Sequence</button>
    <button [class.active]="mode() === 'reverse'" (click)="modeChange.emit('reverse')">Reverse</button>
    <button [class.active]="mode() === 'complete'" (click)="modeChange.emit('complete')">Complete</button>
  </div>
  <div class="fields">
    <label>
      Count
      <input type="number" min="1" max="30" [value]="config().numberLength" (change)="onNumberLength($event)" />
    </label>
    <label>
      @if (mode() === 'complete') { Duration } @else { Interval }
      <input type="number" min="1" max="100000" [value]="config().timing" (change)="onTiming($event)" />
    </label>
  </div>
</div>
